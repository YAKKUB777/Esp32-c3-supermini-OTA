name: Build NRF24 Scanner

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout code
      uses: actions/checkout@v4
      
    - name: Setup Python
      uses: actions/setup-python@v5
      with:
        python-version: '3.11'
        
    - name: Install PlatformIO
      run: pip install platformio
        
    - name: Build firmware
      run: platformio run
      
    - name: List build output
      run: |
        echo "=== Build output ==="
        find .pio -name "*.bin" -type f
        ls -la .pio/build/*/
        
    - name: Upload firmware artifact
      uses: actions/upload-artifact@v4
      with:
        name: firmware
        path: .pio/build/**/firmware.bin