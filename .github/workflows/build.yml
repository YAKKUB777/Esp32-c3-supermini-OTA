name: Build ESP32-C3 Jammer

on: [push, pull_request]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Також оновив до v4 для стабільності

      - name: Install Arduino CLI
        uses: arduino/setup-arduino-cli@v1

      - name: Install ESP32 Platform
        run: |
          arduino-cli core update-index --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json
          arduino-cli core install esp32:esp32 --additional-urls https://raw.githubusercontent.com/espressif/arduino-esp32/gh-pages/package_esp32_index.json

      - name: Install Libraries
        run: |
          arduino-cli lib install "RF24"

      - name: Compile Sketch
        run: |
          # Створюємо папку для білду
          mkdir -p build
          # Компілюємо. Вказуємо шлях до іно-файлу згідно з твоєю структурою
          arduino-cli compile --fqbn esp32:esp32:esp32c3 --output-dir ./build ./sketch/sketch.ino

      - name: Upload Binary Artifact
        uses: actions/upload-artifact@v4 # ОНОВЛЕНО ДО V4
        with:
          name: esp32c3-jammer-firmware-${{ github.run_id }} # Додав ID для унікальності
          path: ./build/*.bin
          if-no-files-found: error
